<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malice Threads Storefront</title>
  <link rel="icon" type="image/png" href="assets/imageassets/lips.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="storefront-page shop-page">
  <div class="kiss-layer" id="kissLayer" aria-hidden="true"></div>

  <div class="ticker" aria-label="Store announcements">
    <div class="ticker__track">
      <span>☠︎︎ ⋆₊ ♱</span>
      <span>New Drop Out Now</span>
      <span>♱ ₊⋆ ☠︎︎</span>
      <span>New Drop Out Now</span>
      <span>☠︎︎ ⋆₊ ♱</span>
      <span>New Drop Out Now</span>
      <span>♱ ₊⋆ ☠︎︎</span>
      <span>New Drop Out Now</span>
    </div>
  </div>

  <main class="storefront-shell">
    <header class="storefront-header">
      <nav class="storefront-nav storefront-nav--left" aria-label="Store navigation">
        <a href="#products">Shop</a>
        <a href="#products">New</a>
        <a href="one-of-one.html">1/1</a>
      </nav>

      <a href="storefront.html" class="storefront-logo-link" aria-label="Malice Threads storefront">
        <img src="assets/logo/malice threads-01.png" alt="Malice Threads" class="storefront-logo" />
      </a>

      <nav class="storefront-nav storefront-nav--right" aria-label="Contact navigation">
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="editorial-hero" aria-labelledby="editorial-heading">
      <div class="editorial-hero__frame">
        <img
          src="assets/editorial/IMG_4386.jpg"
          alt="Editorial campaign image"
          class="editorial-hero__image"
          data-rotating-image
          data-images="assets/editorial/IMG_4386.jpg,assets/editorial/IMG_4386(1).jpg,assets/editorial/B1DAC21C-84DA-495A-A599-4BCE570E348E.jpg"
        />
      </div>
    </section>

    <section class="product-section" id="products" aria-labelledby="products-heading">
      <div class="section-heading">
        <h1 id="products-heading">Storefront</h1>
        <p>Two pieces from the current edit.</p>
      </div>

      <div class="product-grid">
        <a class="product-card product-link" href="product-veil-slip-tee.html" aria-label="View Veil Slip Tee">
          <div class="product-card__image-wrap">
            <img src="assets/product/IMG_3398.jpg" alt="Veil Slip Tee" class="product-card__image" />
          </div>
          <div class="product-card__meta">
            <h2>Veil Slip Tee</h2>
            <p>Soft cotton / washed white</p>
            <span>$78</span>
          </div>
          <div class="product-card__actions">
            <span class="button-link">Buy now</span>
          </div>
        </a>

        <a class="product-card product-link" href="product-lip-mini.html" aria-label="View 1/1 Lip Mini">
          <div class="product-card__image-wrap">
            <img src="assets/product/IMG_3400.jpg" alt="Lip Mini" class="product-card__image" />
          </div>
          <div class="product-card__meta">
            <h2>Lip Mini</h2>
            <p>One of one / hand-finished</p>
            <span>$124</span>
          </div>
          <div class="product-card__actions">
            <span class="button-link">Buy now</span>
          </div>
        </a>
      </div>
    </section>
  </main>

  <script src="kiss.js"></script>
</body>
</html>
