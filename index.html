<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link rel="icon" type="image/png" href="assets/imageassets/lips.png" />
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
  <div class="kiss-layer" id="kissLayer"></div>

  <div class="container">
    <div class="countdown" id="countdown" aria-label="Launch countdown"></div>
    <!-- Replace with your logo -->
    <img src="assets/logo/malice threads-01.png" alt="Logo" class="logo" />
    <div class="coming-soon">COMING SOON</div>
  </div>

  <script>
    const kissLayer = document.getElementById("kissLayer");
    const kissImage = "assets/imageassets/lips.png"; // replace with your kiss image path

    function getExclusionZones() {
      const selectors = window.innerWidth <= 780
        ? [".countdown", ".coming-soon"]
        : [".container"];

      return selectors
        .flatMap((selector) => Array.from(document.querySelectorAll(selector)))
        .map((element) => {
          const rect = element.getBoundingClientRect();
          const padding = window.innerWidth <= 780 ? 28 : 14;

          return {
            left: rect.left - padding,
            right: rect.right + padding,
            top: rect.top - padding,
            bottom: rect.bottom + padding,
          };
        });
    }

    function createKiss() {
      const kiss = document.createElement("img");
      const rotation = Math.random() * 360;
      const scale = window.innerWidth <= 780
        ? 1.15 + Math.random() * 0.8
        : 2 + Math.random();
      const size = 60 * scale;
      const zones = getExclusionZones();
      let x = 0;
      let y = 0;

      for (let attempt = 0; attempt < 60; attempt++) {
        x = Math.random() * Math.max(window.innerWidth - size, 0);
        y = Math.random() * Math.max(window.innerHeight - size, 0);

        const right = x + size;
        const bottom = y + size;
        const overlaps = zones.some((zone) => !(
          right < zone.left ||
          x > zone.right ||
          bottom < zone.top ||
          y > zone.bottom
        ));

        if (!overlaps) {
          break;
        }
      }

      kiss.src = kissImage;
      kiss.classList.add("kiss");

      kiss.style.left = `${x}px`;
      kiss.style.top = `${y}px`;
      kiss.style.transform = `rotate(${rotation}deg) scale(${scale})`;

      kissLayer.appendChild(kiss);
    }

    let count = 0;
    const maxKisses = window.innerWidth <= 780 ? 8 : 12;

    const interval = setInterval(() => {
      if (count >= maxKisses) {
        clearInterval(interval);
        return;
      }
      createKiss();
      count++;
    }, 150);

    const countdown = document.getElementById("countdown");
    const targetDate = new Date("2026-05-22T00:00:00-04:00");

    function updateCountdown() {
      const now = new Date();
      const difference = targetDate - now;

      if (difference <= 0) {
        countdown.textContent = "Now live";
        return;
      }

      const days = Math.floor(difference / (1000 * 60 * 60 * 24));
      const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((difference / (1000 * 60)) % 60);
      const seconds = Math.floor((difference / 1000) % 60);

      countdown.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
